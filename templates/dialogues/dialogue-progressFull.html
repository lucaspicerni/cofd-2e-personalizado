<form class="{{cssClass}}" autocomplete="off">
  <div class="dialoguePane">
    <div class="flex-column">
      <div class="items-block">
        <div class="items-table progress-list">
          <table class="item-table">
            <tr class="item-row header">
              <th class="cell header first"> {{localize "MTA.Reason"}} </th>
              <th class="cell header"> {{localize "MTA.Beats"}} </th>
              {{#if showExtraBeats}} <th class="cell header">{{extraBeatsName}}</th> {{/if}}
              <th class="cell header"> </th>
            </tr>
            {{#each progress as |item iid|}}
            <tr class="item-row {{posnegTwoVal item.beats item.arcaneBeats 0}}">
              <td class="cell first progress-name-cell {{#if @last}} lastRow {{/if}}" data-index="{{@index}}">
                <span class="progress-name">{{item.name}}</span>
              </td>
              <td class="cell progress-beats-cell {{#if @last}} lastRow {{/if}}" data-index="{{@index}}">
                <span class="progress-beats">{{item.beats}}</span>
              </td>
              {{#if ../showExtraBeats}} <td class="cell progress-arcaneBeats-cell {{#if @last}} lastRow {{/if}}"
                data-index="{{@index}}">
                {{#if item.name}}
                <span class="progress-arcaneBeats">{{item.arcaneBeats}}</span>
                {{/if}}
              </td> {{/if}}
              <td class="cell edit-delete {{#if @last}} lastRow {{/if}}" data-index="{{@index}}">
                {{#if item.name}}
                <span class="button stoneButton item-edit" data-index="{{@index}}" title="{{ localize 'MTA.EditItem' }}">
                  <i class="fas fa-edit"></i>
                </span>

                <span class="button stoneButton item-delete" data-index="{{@index}}"
                  title="{{ localize 'MTA.DeleteItem' }}">
                  <i class="fas fa-times-circle"></i>
                </span>
                {{/if}}
              </td>
            </tr>
            {{/each}}
          </table>
        </div>
      </div>
    </div>
  </div>
</form>
